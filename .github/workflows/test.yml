name: Test dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  template-validation:
    name: Template validation
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Render .chezmoi.toml.tmpl
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          chezmoi execute-template --init \
            < .chezmoi.toml.tmpl > /tmp/rendered.toml
          echo "── Rendered .chezmoi.toml ──"
          cat /tmp/rendered.toml

      - name: Render all .tmpl files
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          # sourceDir と data 変数を正しく設定して include が解決できるようにする
          mkdir -p "$HOME/.config/chezmoi"
          IS_MAC=false
          [ "$(uname -s)" = "Darwin" ] && IS_MAC=true
          cat > "$HOME/.config/chezmoi/chezmoi.toml" << EOF
          sourceDir = "$(pwd)"

          [data]
            is_wsl          = false
            is_mac          = ${IS_MAC}
            is_devcontainer = false
          EOF

          fail=0
          while IFS= read -r tmpl; do
            if [ "$tmpl" = "./.chezmoi.toml.tmpl" ]; then continue; fi
            echo "── Rendering: $tmpl"
            if chezmoi execute-template < "$tmpl" > /dev/null; then
              echo "  ✅ OK"
            else
              echo "  ❌ FAILED: $tmpl"
              fail=1
            fi
          done < <(find . -name "*.tmpl" -not -path "./.git/*")
          exit $fail

      - name: Verify file structure
        run: |
          for f in Brewfile Brewfile.mac install.sh README.md .chezmoiignore; do
            test -f "$f" || (echo "❌ $f missing" && exit 1)
          done
          test -x install.sh || (echo "❌ install.sh not executable" && exit 1)
          echo "✅ File structure verified"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ShellCheck (.sh files)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          # fish 設定は ShellCheck の対象外、.tmpl は構文が違うので別途検証済み
          ignore_paths: dot_config
          ignore_names: "*.tmpl"

      - name: Install fish for syntax check
        run: sudo apt-get install -y fish

      - name: Fish syntax check
        run: |
          fail=0
          while IFS= read -r f; do
            echo "── Checking: $f"
            if fish --no-execute "$f"; then
              echo "  ✅ OK"
            else
              echo "  ❌ FAILED: $f"
              fail=1
            fi
          done < <(find . -name "*.fish" -not -path "./.git/*")
          exit $fail

      - name: YAML validation
        run: |
          fail=0
          while IFS= read -r f; do
            echo "── Validating: $f"
            if yq '.' "$f" > /dev/null; then
              echo "  ✅ OK"
            else
              echo "  ❌ FAILED: $f"
              fail=1
            fi
          done < <(find . \( -name "*.yml" -o -name "*.yaml" \) -not -path "./.git/*")
          exit $fail

      - name: TOML validation
        run: |
          fail=0
          while IFS= read -r f; do
            echo "── Validating: $f"
            if python3 -c "import sys, tomllib; tomllib.load(open(sys.argv[1], 'rb'))" "$f"; then
              echo "  ✅ OK"
            else
              echo "  ❌ FAILED: $f"
              fail=1
            fi
          done < <(find . -name "*.toml" -not -path "./.git/*")
          exit $fail

  integration-test:
    name: Integration test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Link checkout to ~/dotfiles
        run: ln -s "$GITHUB_WORKSPACE" ~/dotfiles

      - name: Run install.sh
        run: bash ~/dotfiles/install.sh

      - name: Set PATH for verification
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"

      - name: chezmoi が ~/.local/bin 経由で使えるか
        run: |
          test -f "$HOME/.local/bin/chezmoi" || command -v chezmoi
          chezmoi --version
          echo "✅ chezmoi accessible"

      - name: fish がインストールされているか
        run: |
          fish --version
          echo "✅ fish installed"

      - name: starship.toml が生成されているか
        run: |
          test -f "$HOME/.config/starship.toml" \
            && echo "✅ starship.toml exists" \
            || (echo "❌ starship.toml missing"; exit 1)

      - name: fish の PATH に ~/.local/bin が含まれているか
        run: |
          fish -c "
            contains -- \$HOME/.local/bin \$PATH
            or begin
              echo '❌ ~/.local/bin not in fish PATH'
              echo 'PATH: '\$PATH
              exit 1
            end
            echo '✅ ~/.local/bin in fish PATH'
          "

      - name: mise が chezmoi ソースを trust しているか
        run: |
          cd ~/dotfiles/dot_config
          if mise config ls 2>&1 | grep -q "not trusted"; then
            echo "❌ mise still shows 'not trusted' in dotfiles source dir"
            mise config ls 2>&1
            exit 1
          fi
          echo "✅ mise trust OK"

      - name: fisher とプラグインがインストールされているか
        run: |
          fish -c "
            functions -q fisher
            or begin
              echo '❌ fisher not installed'
              exit 1
            end
            echo '✅ fisher installed'
            set installed (fisher list)
            if not string match -q '*fzf.fish*' \$installed
              echo '❌ fzf.fish not installed'
              fisher list
              exit 1
            end
            echo '✅ fish plugins installed'
          "
