gui:
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - blue
  showIcons: true
  mouseEvents: true

os:
  editPreset: helix

customCommands:
  - key: "C"
    command: 'git commit -m "{{.Form.Prefix}}{{.Form.Message}}"'
    context: "files"
    description: "Commit with conventional prefix"
    prompts:
      - type: menu
        title: "Commit prefix"
        key: Prefix
        options:
          - name: "feat"
            description: "新機能追加（ユーザーが体感できる変化）"
            value: "feat: "
          - name: "fix"
            description: "バグ修正（想定外の動作を直す）"
            value: "fix: "
          - name: "add"
            description: "ファイル・依存パッケージ・設定などの追加"
            value: "add: "
          - name: "docs"
            description: "ドキュメント・コメントのみの変更"
            value: "docs: "
          - name: "refactor"
            description: "動作を変えないコード整理・構造改善"
            value: "refactor: "
          - name: "test"
            description: "テストの追加・修正のみ（本体コードは触らない）"
            value: "test: "
          - name: "chore"
            description: "ビルド・CI・ツール設定など本体に影響しない変更"
            value: "chore: "
          - name: "style"
            description: "意味に影響しない整形・空白・セミコロン修正"
            value: "style: "
          - name: "perf"
            description: "パフォーマンス改善（外から見た動作は同じ）"
            value: "perf: "
      - type: input
        title: "Commit message"
        key: Message
