gui:
  theme:
    activeBorderColor:
      - green
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - blue
  showIcons: true
  mouseEvents: true

os:
  editPreset: helix

customCommands:
  - key: "C"
    command: 'git commit -m "{{.Form.Prefix}}{{.Form.Message}}"'
    context: "files"
    description: "Commit with conventional prefix"
    prompts:
      - type: menu
        title: "Commit prefix"
        key: Prefix
        options:
          - name: "feat"
            description: "新機能・新モデル・新パイプラインの追加"
            value: "feat: "
          - name: "fix"
            description: "バグ修正（データ処理の不具合・モデルのエラーなど）"
            value: "fix: "
          - name: "add"
            description: "データ・ノートブック・依存パッケージ・設定の追加"
            value: "add: "
          - name: "data"
            description: "データ取得・前処理・クリーニング・特徴量エンジニアリング"
            value: "data: "
          - name: "model"
            description: "モデルアーキテクチャ・ハイパーパラメータ・学習設定の変更"
            value: "model: "
          - name: "exp"
            description: "実験・試行（再現性を持たせた変更、仮説検証など）"
            value: "exp: "
          - name: "analysis"
            description: "EDA・統計分析・可視化ノートブックの変更"
            value: "analysis: "
          - name: "refactor"
            description: "動作を変えないコード整理（ノートブック整頓含む）"
            value: "refactor: "
          - name: "docs"
            description: "ドキュメント・コメント・README・実験メモ"
            value: "docs: "
          - name: "chore"
            description: "CI・環境設定・ツール類など分析本体に影響しない変更"
            value: "chore: "
      - type: input
        title: "Commit message"
        key: Message
