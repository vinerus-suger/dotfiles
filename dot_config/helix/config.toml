theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = true
cursorline = true
bufferline = "multiple"
color-modes = true
auto-format = true
auto-save = false
completion-trigger-len = 1
true-color = true
rulers = [80, 120]

[editor.statusline]
left = ["mode", "spinner", "version-control", "file-name", "file-modification-indicator"]
center = []
right = ["diagnostics", "selections", "register", "position", "file-encoding", "file-line-ending", "file-type"]

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false
git-ignore = true

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true
character = "╎"

[editor.soft-wrap]
enable = true
max-wrap = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[keys.normal]
# Space で半ページ移動
C-d = ["half_page_down", "align_view_center"]
C-u = ["half_page_up",   "align_view_center"]
# Esc 連打でハイライト解除
esc = ["collapse_selection", "keep_primary_selection"]

[keys.insert]
# jk で normal mode（vim 系の習慣）
j = { k = "normal_mode" }
