# ── Starship プロンプト設定 ───────────────────
format = """
$directory\
$git_branch\
$git_status\
$jj_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3
truncate_to_repo  = true
style             = "bold cyan"

[git_branch]
symbol = " "
style  = "bold purple"

[git_status]
style = "bold red"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"

[cmd_duration]
min_time          = 2_000
format            = "[$duration](bold yellow) "
show_milliseconds = false

[python]
symbol = " "

[nodejs]
symbol = " "

[rust]
symbol = "🦀 "

[golang]
symbol = " "
